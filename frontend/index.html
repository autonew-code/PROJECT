<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกสุขภาพประจำวัน</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="margin-top: 20px;">
        <a href="user.html" style="display: block; margin-bottom: 20px; text-decoration: none;">📊 ไปหน้า Dashboard สรุปผล</a>
        
        <div class="header form-input">บันทึกสุขภาพประจำวัน</div>
        
        <input type="hidden" id="log_id" name="log_id">

        <div class="flex form-input">
            <div class="header-form">วันที่บันทึก</div>
            <input class="form" name="record_date" type="date">
        </div>

        <div class="flex form-input">
            <div class="header-form">น้ำหนัก (กก.)</div>
            <input class="form" name="weight" type="number" step="0.1" placeholder="ระบุน้ำหนักของคุณ">
        </div>

        <div class="flex form-input">
            <div class="header-form">แคลอรี่ที่บริโภค (kcal)</div>
            <input class="form" name="calories" type="number" placeholder="เช่น 1500">
        </div>

        <div class="flex form-input">
            <div class="header-form">ประเภทการออกกำลังกาย</div>
            <select class="form" name="exercise_type">
                <option value="">ไม่ได้ออกกำลังกาย</option>
                <option value="วิ่ง">วิ่ง</option>
                <option value="เดิน">เดิน</option>
                <option value="ปั่นจักรยาน">ปั่นจักรยาน</option>
                <option value="ว่ายน้ำ">ว่ายน้ำ</option>
                <option value="เวทเทรนนิ่ง">เวทเทรนนิ่ง</option>
                <option value="โยคะ">โยคะ</option>
                <option value="อื่นๆ">อื่นๆ</option>
            </select>
        </div>

        <div class="flex form-input">
            <div class="header-form">เวลาออกกำลังกาย (นาที)</div>
            <input class="form" name="exercise_duration" type="number" placeholder="เช่น 30">
        </div>

        <div class="form-input" style="display: flex; flex-direction: column;">
            <div class="header-form">บันทึกเพิ่มเติม</div>
            <textarea class="form" name="note" rows="3" placeholder="ความรู้สึกวันนี้..."></textarea>
        </div>

        <div id="message" class="message"></div>
        <button class="button" onclick="saveData()">บันทึกข้อมูล</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
